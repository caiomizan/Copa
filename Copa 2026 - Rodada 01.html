<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa 2026 – Rodada 01</title>
  <style>
    :root {
      --bg: #0b1623;
      --card: #131f33;
      --border: #1e3050;
      --accent: #c9a227;
      --text: #e8eef4;
      --muted: #7a8fa8;
      --win: #2ecc71;
      --draw: #f39c12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0b1623 0%, #122a1e 100%);
      border-bottom: 2px solid var(--accent);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo { font-size: 1.6rem; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text); font-weight: 400; font-size: 1rem; margin-left: 0.4rem; }
    #status-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem; }
    .actions { display: flex; gap: 0.6rem; align-items: center; }
    button {
      padding: 0.55rem 1.1rem;
      border: none; border-radius: 6px;
      cursor: pointer; font-size: 0.875rem; font-weight: 600;
      transition: opacity 0.2s, border-color 0.2s, color 0.2s;
    }
    .btn-reload { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
    .btn-reload:hover { color: var(--text); border-color: var(--muted); }
    .btn-save { background: var(--accent); color: #000; }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Tabs ── */
    #groups-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: none;
      padding: 0 1.5rem;
      overflow-x: auto;
      white-space: nowrap;
    }
    .g-tab {
      display: inline-block;
      padding: 0.85rem 1.25rem;
      cursor: pointer;
      font-weight: 700; font-size: 0.875rem;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .g-tab:hover { color: var(--text); }
    .g-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .g-tab.list-tab { border-left: 1px solid var(--border); margin-left: 0.5rem; padding-left: 1.5rem; }

    /* ── Content ── */
    #content { padding: 2rem; max-width: 880px; margin: 0 auto; }

    /* ── Loading / Error ── */
    .centered { text-align: center; padding: 5rem 2rem; }
    .centered h2 { font-size: 1.6rem; color: var(--accent); margin-bottom: 0.75rem; }
    .centered p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; }
    .centered code {
      display: inline-block; background: var(--card);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.2rem 0.5rem; font-family: monospace; color: var(--accent); margin-top: 0.5rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Group Section ── */
    .g-section { display: none; }
    .g-section.visible { display: block; }
    .g-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 1rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Match Card ── */
    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.75rem;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.75rem;
      transition: border-color 0.2s;
    }
    .match-card:hover { border-color: #2e4a70; }
    .team-box { display: flex; align-items: center; }
    .team-box.right { justify-content: flex-end; }
    .tname { font-weight: 600; font-size: 0.95rem; }
    .score-center { display: flex; flex-direction: column; align-items: center; gap: 0.35rem; }
    .score-row { display: flex; align-items: center; gap: 0.4rem; }
    .score-input {
      width: 54px; height: 54px;
      background: #09131f;
      border: 2px solid var(--border);
      border-radius: 8px;
      color: var(--text); font-size: 1.5rem; font-weight: 800; text-align: center;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .score-input:focus { outline: none; border-color: var(--accent); }
    .score-sep { font-size: 1.2rem; color: var(--muted); font-weight: 700; }
    .match-info {
      display: flex; align-items: center;
      gap: 0.5rem; flex-wrap: wrap; justify-content: center;
    }
    .dt { font-size: 0.72rem; color: var(--muted); }

    /* ── Badges ── */
    .badge {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 0.15rem 0.5rem; border-radius: 10px;
    }
    .badge-win  { background: rgba(46,204,113,0.15); color: var(--win); }
    .badge-draw { background: rgba(243,156,18,0.15);  color: var(--draw); }
    .badge-none { display: none; }
    .saldo-val { font-size: 0.7rem; color: var(--muted); }

    /* ── List View ── */
    #section-list { display: none; }
    #section-list.visible { display: block; }

    .list-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .list-table th {
      background: var(--card);
      color: var(--muted);
      font-weight: 700;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.65rem 0.75rem;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }
    .list-table th.sortable { cursor: pointer; }
    .list-table th.sortable:hover { color: var(--text); }
    .list-table th.sorted { color: var(--accent); }
    .sort-ind { margin-left: 0.3rem; font-size: 0.65rem; opacity: 0.7; }
    .list-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .list-table tr:last-child td { border-bottom: none; }
    .list-table tbody tr { transition: background 0.15s; }
    .list-table tbody tr:hover { background: rgba(255,255,255,0.03); }

    .td-team { font-weight: 600; }
    .td-team.right { text-align: right; }

    .list-score-row { display: flex; align-items: center; gap: 0.3rem; justify-content: center; }
    .list-score-input {
      width: 38px; height: 34px;
      background: #09131f;
      border: 2px solid var(--border);
      border-radius: 6px;
      color: var(--text); font-size: 1rem; font-weight: 800; text-align: center;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    .list-score-input::-webkit-outer-spin-button,
    .list-score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .list-score-input:focus { outline: none; border-color: var(--accent); }
    .list-sep { color: var(--muted); font-weight: 700; font-size: 0.9rem; }

    .td-grupo {
      font-weight: 800; font-size: 0.8rem;
      color: var(--accent); text-align: center;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      padding: 0.6rem 1.2rem; border-radius: 8px;
      font-weight: 600; font-size: 0.85rem;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    #toast.ok  { background: #1a472a; color: var(--win); }
    #toast.err { background: #471a1a; color: #e74c3c; }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">⚽ Copa 2026 <span>Rodada 01</span></div>
    <div id="status-label">Carregando…</div>
  </div>
  <div class="actions">
    <button class="btn-reload" onclick="loadCSV()">↺ Recarregar</button>
    <button class="btn-save" id="btn-save" onclick="saveCSV()" disabled>💾 Salvar</button>
  </div>
</header>

<div id="groups-nav"></div>
<div id="content">
  <div class="centered">
    <div class="spinner"></div>
    <h2>Carregando jogos…</h2>
  </div>
</div>

<div id="toast"></div>

<script>
/* ── State ── */
let header  = [];
let matches = [];
let activeGroup = null;
let sortKey = 'dia';
let sortDir = 1;

/* ── CSV ── */
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  header = lines[0].split(',');
  matches = lines.slice(1).map((line, i) => {
    const cols = line.split(',');
    let p1Raw = (cols[1] || '').trim();
    let p2Raw = (cols[2] || '').trim();
    if (/^\d+x\d+$/i.test(p1Raw)) {
      const parts = p1Raw.split(/x/i);
      p1Raw = parts[0]; p2Raw = parts[1];
    }
    return {
      id:    i,
      sel1:  (cols[0] || '').trim(),
      p1:    p1Raw === '' ? '' : parseInt(p1Raw, 10),
      p2:    p2Raw === '' ? '' : parseInt(p2Raw, 10),
      sel2:  (cols[3] || '').trim(),
      dia:   (cols[6] || '').trim(),
      hora:  (cols[7] || '').trim(),
      grupo: (cols[8] || '').trim(),
    };
  });
}

function computeMatch(m) {
  const p1 = typeof m.p1 === 'number' ? m.p1 : null;
  const p2 = typeof m.p2 === 'number' ? m.p2 : null;
  if (p1 === null || p2 === null) return { venc: '', saldo: '' };
  return {
    venc:  p1 > p2 ? m.sel1 : p2 > p1 ? m.sel2 : 'Empate',
    saldo: String(p1 - p2),
  };
}

function generateCSV() {
  const rows = [header.join(',')];
  for (const m of matches) {
    const { venc, saldo } = computeMatch(m);
    const p1 = typeof m.p1 === 'number' ? m.p1 : '';
    const p2 = typeof m.p2 === 'number' ? m.p2 : '';
    rows.push([m.sel1, p1, p2, m.sel2, venc, saldo, m.dia, m.hora, m.grupo].join(','));
  }
  return rows.join('\r\n');
}

/* ── API ── */
async function loadCSV() {
  setStatus('Carregando…');
  try {
    const res = await fetch('/api/csv');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    parseCSV(await res.text());
    renderAll();
    setStatus('dados/Copa 2026 - Rodada 01.csv');
    document.getElementById('btn-save').disabled = false;
  } catch (e) {
    showError(e.message);
  }
}

async function saveCSV() {
  try {
    const res = await fetch('/api/csv', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain; charset=utf-8' },
      body: generateCSV(),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    toast('✓ Salvo com sucesso!', 'ok');
  } catch (e) {
    toast('Erro ao salvar: ' + e.message, 'err');
  }
}

/* ── Render ── */
function renderAll() {
  const groups = [...new Set(matches.map(m => m.grupo).filter(Boolean))];
  activeGroup = groups[0] || null;

  // tabs
  const nav = document.getElementById('groups-nav');
  nav.style.display = 'block';
  nav.innerHTML = '';
  for (const g of groups) {
    const tab = document.createElement('div');
    tab.className = 'g-tab' + (g === activeGroup ? ' active' : '');
    tab.textContent = 'Grupo ' + g;
    tab.dataset.group = g;
    tab.onclick = () => switchGroup(g);
    nav.appendChild(tab);
  }
  const listTab = document.createElement('div');
  listTab.className = 'g-tab list-tab';
  listTab.textContent = '☰ Lista';
  listTab.dataset.group = '__list__';
  listTab.onclick = () => switchGroup('__list__');
  nav.appendChild(listTab);

  // group sections
  const content = document.getElementById('content');
  content.innerHTML = '';
  for (const g of groups) {
    const sec = document.createElement('div');
    sec.className = 'g-section' + (g === activeGroup ? ' visible' : '');
    sec.id = 'group-' + g;
    sec.innerHTML = `<div class="g-title">Grupo ${g}</div>`;
    matches.filter(m => m.grupo === g).forEach(m => sec.appendChild(buildCard(m)));
    content.appendChild(sec);
  }

  // list section
  const listSec = document.createElement('div');
  listSec.id = 'section-list';
  content.appendChild(listSec);
  renderList();
}

function switchGroup(g) {
  activeGroup = g;
  document.querySelectorAll('.g-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.group === g);
  });
  document.querySelectorAll('.g-section').forEach(s => {
    s.classList.toggle('visible', s.id === 'group-' + g);
  });
  const listSec = document.getElementById('section-list');
  if (listSec) listSec.classList.toggle('visible', g === '__list__');
  if (g === '__list__') renderList();
}

/* ── Card view ── */
function buildCard(m) {
  const card = document.createElement('div');
  card.className = 'match-card';
  const v1 = typeof m.p1 === 'number' ? m.p1 : '';
  const v2 = typeof m.p2 === 'number' ? m.p2 : '';

  card.innerHTML = `
    <div class="team-box right">
      <span class="tname">${m.sel1}</span>
    </div>
    <div class="score-center">
      <div class="score-row">
        <input class="score-input" type="number" min="0" max="99" value="${v1}"
               data-id="${m.id}" data-side="p1" placeholder="–">
        <span class="score-sep">×</span>
        <input class="score-input" type="number" min="0" max="99" value="${v2}"
               data-id="${m.id}" data-side="p2" placeholder="–">
      </div>
      <div class="match-info">
        <span class="dt">📅 ${m.dia} ⏰ ${m.hora}</span>
        <span class="badge badge-none" data-badge-id="${m.id}"></span>
        <span class="saldo-val" data-saldo-id="${m.id}"></span>
      </div>
    </div>
    <div class="team-box">
      <span class="tname">${m.sel2}</span>
    </div>
  `;

  updateBadge(m);
  attachScoreListeners(card);
  return card;
}

/* ── List view ── */
function renderList() {
  const sec = document.getElementById('section-list');
  if (!sec) return;

  const sorted = [...matches].sort((a, b) => {
    let av = a[sortKey] ?? '';
    let bv = b[sortKey] ?? '';
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  const dirs = { dia: sortDir, hora: 0, grupo: 0 };
  const icon = (key) => {
    if (key !== sortKey) return '<span class="sort-ind">↕</span>';
    return sortDir === 1
      ? '<span class="sort-ind" style="color:var(--accent)">↑</span>'
      : '<span class="sort-ind" style="color:var(--accent)">↓</span>';
  };

  sec.innerHTML = `
    <table class="list-table">
      <thead>
        <tr>
          <th class="sortable${sortKey==='dia'?' sorted':''}"   data-key="dia">Data ${icon('dia')}</th>
          <th class="sortable${sortKey==='hora'?' sorted':''}"  data-key="hora">Hora ${icon('hora')}</th>
          <th class="sortable${sortKey==='grupo'?' sorted':''}" data-key="grupo">Grupo ${icon('grupo')}</th>
          <th style="text-align:right">Time 1</th>
          <th style="text-align:center">Placar</th>
          <th>Time 2</th>
          <th>Resultado</th>
          <th>Saldo</th>
        </tr>
      </thead>
      <tbody id="list-tbody"></tbody>
    </table>
  `;

  sec.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (sortKey === key) sortDir *= -1;
      else { sortKey = key; sortDir = 1; }
      renderList();
    });
  });

  const tbody = sec.querySelector('#list-tbody');
  for (const m of sorted) {
    const v1 = typeof m.p1 === 'number' ? m.p1 : '';
    const v2 = typeof m.p2 === 'number' ? m.p2 : '';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>📅 ${m.dia}</td>
      <td>⏰ ${m.hora}</td>
      <td class="td-grupo">${m.grupo}</td>
      <td class="td-team right">${m.sel1}</td>
      <td>
        <div class="list-score-row">
          <input class="list-score-input" type="number" min="0" max="99" value="${v1}"
                 data-id="${m.id}" data-side="p1" placeholder="–">
          <span class="list-sep">×</span>
          <input class="list-score-input" type="number" min="0" max="99" value="${v2}"
                 data-id="${m.id}" data-side="p2" placeholder="–">
        </div>
      </td>
      <td class="td-team">${m.sel2}</td>
      <td><span class="badge badge-none" data-badge-id="${m.id}"></span></td>
      <td><span class="saldo-val" data-saldo-id="${m.id}"></span></td>
    `;
    updateBadge(m);
    attachScoreListeners(tr);
    tbody.appendChild(tr);
  }
}

/* ── Shared score listener ── */
function attachScoreListeners(el) {
  el.querySelectorAll('[data-id][data-side]').forEach(inp => {
    inp.addEventListener('input', () => {
      const id   = +inp.dataset.id;
      const side = inp.dataset.side;
      const val  = inp.value.trim();
      const match = matches.find(x => x.id === id);
      match[side] = val === '' ? '' : Math.max(0, parseInt(val, 10) || 0);
      // sync sibling inputs for same match in other views
      document.querySelectorAll(`[data-id="${id}"][data-side="${side}"]`).forEach(other => {
        if (other !== inp) other.value = match[side];
      });
      updateBadge(match);
    });
  });
}

/* ── Badge update (all views) ── */
function updateBadge(m) {
  const { venc, saldo } = computeMatch(m);
  document.querySelectorAll(`[data-badge-id="${m.id}"]`).forEach(el => {
    if (!venc) { el.className = 'badge badge-none'; el.textContent = ''; return; }
    el.className = venc === 'Empate' ? 'badge badge-draw' : 'badge badge-win';
    el.textContent = venc === 'Empate' ? 'Empate' : '🏆 ' + venc;
  });
  document.querySelectorAll(`[data-saldo-id="${m.id}"]`).forEach(el => {
    if (!venc) { el.textContent = ''; return; }
    const s = parseInt(saldo, 10);
    el.textContent = 'Saldo: ' + (s > 0 ? '+' + s : s);
  });
}

/* ── Helpers ── */
function setStatus(msg) { document.getElementById('status-label').textContent = msg; }

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="centered">
      <h2>Não foi possível carregar</h2>
      <p>Verifique se o servidor está rodando.<br>
         Abra <code>iniciar.bat</code> e tente novamente.</p>
      <p style="margin-top:1rem;color:#e74c3c;font-size:0.8rem">${msg}</p>
    </div>`;
  setStatus('Erro ao carregar');
}

let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (!document.getElementById('btn-save').disabled) saveCSV();
  }
});

loadCSV();
</script>
</body>
</html>
